<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR สื่อการสอน 20 คำศัพท์ สิ่งของรอบตัวและของเล่น</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="model-1" src="./models/pencil.glb"></a-asset-item>
        <a-asset-item id="model-2" src="./models/eraser.glb"></a-asset-item>
        <a-asset-item id="model-3" src="./models/scissors.glb"></a-asset-item>
        <a-asset-item id="model-4" src="./models/ruler.glb"></a-asset-item>
        <a-asset-item id="model-5" src="./models/notebook.glb"></a-asset-item>
        <a-asset-item id="model-6" src="./models/bag.glb"></a-asset-item>
        <a-asset-item id="model-7" src="./models/glass.glb"></a-asset-item>
        <a-asset-item id="model-8" src="./models/toothbrush.glb"></a-asset-item>
        <a-asset-item id="model-9" src="./models/shoes.glb"></a-asset-item>
        <a-asset-item id="model-10" src="./models/chair.glb"></a-asset-item>
        <a-asset-item id="model-11" src="./models/teddy_bear.glb"></a-asset-item>
        <a-asset-item id="model-12" src="./models/robot.glb"></a-asset-item>
        <a-asset-item id="model-13" src="./models/dinosaur.glb"></a-asset-item>
        <a-asset-item id="model-14" src="./models/toy_car.glb"></a-asset-item>
        <a-asset-item id="model-15" src="./models/airplane.glb"></a-asset-item>
        <a-asset-item id="model-16" src="./models/boat.glb"></a-asset-item>
        <a-asset-item id="model-17" src="./models/ball.glb"></a-asset-item>
        <a-asset-item id="model-18" src="./models/clay.glb"></a-asset-item>
        <a-asset-item id="model-19" src="./models/balloon.glb"></a-asset-item>
        <a-asset-item id="model-20" src="./models/kite.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-1" position="0 0 0" scale="0.3 0.3 0.3" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-2" position="0 0 0" scale="8 8 8" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-3" position="0 0 0" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-4" position="0 0 0" scale="6 6 6" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 4">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-5" position="0 0 0" scale="0.08 0.08 0.08" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 5">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-6" position="0 0 0" scale="0.02 0.02 0.02" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 6">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-7" position="0 0 0" scale="0.1 0.1 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 7">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-8" position="0 0 0" scale="0.01 0.01 0.01" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 8">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-9" position="0 0 0" scale="0.9 0.9 0.9" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 9">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-10" position="0 0 0" scale="0.7 0.7 0.7" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 10">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-11" position="0 0 0" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 11">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-12" position="0 0 0" scale="0.04 0.04 0.04" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 12">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-13" position="0 0 0" scale="0.005 0.005 0.005" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 13">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-14" position="0 0 0" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 14">

          <a-gltf-model src="#model-15" position="0 0 0" scale="0.1 0.1 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 15">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-16" position="0 0 0" scale="0.02 0.02 0.02" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 16">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-17" position="0 0 0" scale="0.2 0.2 0.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 17">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-18" position="0 0 0" scale="0.08 0.08 0.08" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 18">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-19" position="0 0 0" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 19">
        <a-entity rotation="90 0 0">
          <a-gltf-model src="#model-20" position="0 0 0" scale="0.02 0.02 0.02" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-gltf-model>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
