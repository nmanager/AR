<!DOCTYPE html>
<html>
  <head>
    <title>AR Flashcards - 15 คำศัพท์</title>
    <!-- นำเข้า A-Frame และ AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <!-- เริ่มต้นฉาก AR เพิ่ม cursor เพื่อให้ใช้นิ้วแตะหน้าจอได้ -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- 1. ส่วนเตรียมไฟล์ภาพทั้งหมด (ด้านหน้า และ ด้านหลัง) -->
      <a-assets>
        <!-- คำศัพท์ที่ 1: ดินสอ -->
        <img id="front-1" src="images/front-1.jpg"> <!-- รูปดินสอ -->
        <img id="back-1" src="images/back-1.jpg">   <!-- คำศัพท์ ดินสอ/Pencil -->
        
        <!-- คำศัพท์ที่ 2: ยางลบ -->
        <img id="front-2" src="images/front-2.jpg">
        <img id="back-2" src="images/back-2.jpg">

        <!-- คำศัพท์ที่ 3-15 เพิ่มต่อลงมาตรงนี้... -->
      </a-assets>

      <!-- 2. มาร์กเกอร์และตัวการ์ดคำศัพท์ที่ 1 -->
      <a-marker type="pattern" url="markers/pattern-1.patt">
        <!-- แกนหลักสำหรับวางราบบนโต๊ะ -->
        <a-entity position="0 0 0" rotation="-90 0 0">
          <!-- ตัวการ์ดที่ใส่คลาส .clickable เพื่อให้แตะได้ และเรียกใช้ระบบพลิกการ์ด (flip-card) -->
          <a-entity class="clickable" flip-card position="0 0 0">
            <!-- ด้านหน้า (รูปภาพ) -->
            <a-image src="#front-1" position="0 0 0.01" width="2" height="2"></a-image>
            <!-- ด้านหลัง (คำศัพท์) สั่งให้หันหลังรอไว้ (rotation="0 180 0") -->
            <a-image src="#back-1" position="0 0 -0.01" rotation="0 180 0" width="2" height="2"></a-image>
          </a-entity>
        </a-entity>
      </a-marker>

      <!-- 2. มาร์กเกอร์และตัวการ์ดคำศัพท์ที่ 2 -->
      <a-marker type="pattern" url="markers/pattern-2.patt">
        <a-entity position="0 0 0" rotation="-90 0 0">
          <a-entity class="clickable" flip-card position="0 0 0">
            <a-image src="#front-2" position="0 0 0.01" width="2" height="2"></a-image>
            <a-image src="#back-2" position="0 0 -0.01" rotation="0 180 0" width="2" height="2"></a-image>
          </a-entity>
        </a-entity>
      </a-marker>

      <!-- เพิ่มมาร์กเกอร์ที่ 3-15 ต่อลงมาตรงนี้ โดยเปลี่ยนเลข url และเลข src ให้ตรงกัน... -->

      <a-entity camera></a-entity>
    </a-scene>

    <!-- 3. สคริปต์สำหรับการพลิกการ์ด -->
    <script>
      AFRAME.registerComponent('flip-card', {
        init: function () {
          this.isFlipped = false; // สถานะเริ่มต้นคือไม่พลิก
          
          // เมื่อมีการแตะหรือคลิกที่การ์ด
          this.el.addEventListener('click', () => {
            let targetY = this.isFlipped ? 0 : 180; // ถ้าพลิกแล้วให้กลับมา 0 ถ้ายังให้ไปที่ 180 องศา
            
            // สั่งให้เกิดอนิเมชันหมุนพลิกหน้าการ์ด
            this.el.setAttribute('animation', `property: rotation; to: 0 ${targetY} 0; dur: 500; easing: easeInOutQuad`);
            
            this.isFlipped = !this.isFlipped; // สลับสถานะ
          });
        }
      });
    </script>

  </body>
</html>
